services:

  # ─── Base de datos del microservicio ────────────────────────────────────────
  calendario-postgres:
    image: postgres:16
    container_name: calendario-postgres
    restart: always
    environment:
      POSTGRES_DB: calendario_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - calendario_pgdata:/var/lib/postgresql/data
    ports:
      - "5021:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendario_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shared-network

  # ─── Microservicio Calendario de Entregas ────────────────────────────────────
  calendario-webapi:
    image: curbonato/calendario-webapi:latest
    container_name: calendario-webapi
    restart: unless-stopped
    ports:
      - "7020:7020"
    depends_on:
      calendario-postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__CalendarioDatabase: "Host=calendario-postgres;Port=5432;Database=calendario_db;Username=postgres;Password=postgres;"
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Key: "DiplomadoMicroservicios2025SecretoJTWApiSecurity"
      Jwt__Issuer: "api_security"
      Jwt__Audience: "*"
      # RabbitMQ: apunta al broker compartido de la infra.
      RabbitMQ__Host: "${INFRA_HOST}"
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: "admin"
      RabbitMQ__Password: "admin"
      RabbitMQ__VirtualHost: "/"
      RabbitMQ__DeadLetterExchange: "dead-letter-exchange"
      # Tracing distribuido → Tempo/Collector central.
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://${INFRA_HOST}:4317"
      # Logs estructurados → Loki central.
      Loki__Uri: "http://${INFRA_HOST}:3100"
      # Service discovery con Consul.
      # DROPLET_IP es la IP pública de ESTE host para que Consul pueda hacer healthcheck.
      Consul__Host: "http://${INFRA_HOST}:8500"
      Consul__ServiceName: "calendario-webapi"
      Consul__ServiceAddress: "${DROPLET_IP}"
      Consul__ServicePort: "7020"
      Consul__HealthCheckEndpoint: "/health"
    networks:
      - shared-network

volumes:
  calendario_pgdata:

networks:
  shared-network:
    driver: bridge
