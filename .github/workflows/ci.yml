name: CI - Build, Test & SonarCloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarCloud

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Restore dependencies
        run: dotnet restore calendar-service.sln

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"ramirezcleandro_calendar-microservice" \
            /o:"ramirezcleandro" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: Build
        run: dotnet build calendar-service.sln --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test calendar-service.sln \
            --no-build \
            --configuration Release \
            --settings tests/CalendarioEntregas.Tests/coverlet.runsettings \
            --collect:"XPlat Code Coverage"

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"**/coverage.opencover.xml" \
            -targetdir:coverage-report \
            -reporttypes:"Html;TextSummary"
          cat coverage-report/Summary.txt

      - name: Enforce 80% line coverage
        run: |
          LINE_COV=$(grep -oP 'Line coverage:\s*\K[0-9.]+' coverage-report/Summary.txt | head -1)
          echo "Line coverage detectado: ${LINE_COV}%"
          awk -v cov="$LINE_COV" 'BEGIN { if (cov+0 < 80) { print "Coverage " cov "% < 80% (gate fallido)"; exit 1 } else { print "Coverage OK (>= 80%)" } }'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: |
            **/coverage.opencover.xml
            coverage-report/
          retention-days: 30
