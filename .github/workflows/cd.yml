name: CD - Deploy to Render

on:
  workflow_run:
    workflows: ["CI - Build, Test & SonarCloud"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to Render
        run: |
          echo "Triggering deploy to Render..."
          curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" | grep -q "200" && echo "Deploy triggered successfully" || (echo "Deploy trigger failed" && exit 1)

      - name: Verify service health
        run: |
          echo "Waiting 60 seconds for deploy to start..."
          sleep 60
          echo "Checking health endpoint..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://calendar-microservice-nur.onrender.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Service is healthy!"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 30s..."
            sleep 30
          done
          echo "Service health check failed after 10 attempts"
          exit 1
